spring.application.name=auth-service


spring.datasource.username=authorization-server
spring.datasource.password=auth@123
spring.datasource.url=jdbc:postgresql://localhost:5432/auth-service
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#Since the user entity will be users which is a keyword in postgresql we have to escape it
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

#Mail configurations and since i am using mail hog to
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth= false
spring.mail.properties.mail.smtp.starttls.enable= false


logging.level.root=info

server.error.whitelabel.enabled=false
spring.mvc.problemdetails.enabled=true